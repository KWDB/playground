name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SERVER_PORT: '3006'
  CI: 'true'
  NODE_VERSION: ${{ vars.CI_NODE_VERSION || '20' }}
  PNPM_VERSION: ${{ vars.CI_PNPM_VERSION || '9' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          go mod download

      - name: Verify runtime versions
        run: |
          set -euo pipefail
          echo "Expected Node major: ${NODE_VERSION}"
          echo "Expected pnpm major: ${PNPM_VERSION}"
          echo "Actual Node: $(node --version)"
          echo "Actual pnpm: $(pnpm --version)"
          ACTUAL_NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
          ACTUAL_PNPM_MAJOR="$(pnpm --version | cut -d. -f1)"
          if [ "${ACTUAL_NODE_MAJOR}" != "${NODE_VERSION}" ]; then
            echo "Node major mismatch: expected ${NODE_VERSION}, got ${ACTUAL_NODE_MAJOR}"
            exit 1
          fi
          if [ "${ACTUAL_PNPM_MAJOR}" != "${PNPM_VERSION}" ]; then
            echo "pnpm major mismatch: expected ${PNPM_VERSION}, got ${ACTUAL_PNPM_MAJOR}"
            exit 1
          fi

      - name: Install Playwright browsers and system deps
        run: pnpm exec playwright install --with-deps

      - name: Start Playwright server
        run: |
          make playwright &
          for i in {1..60}; do
            if curl -sf http://localhost:3006/health >/dev/null; then
              echo "Server is ready"
              break
            fi
            sleep 2
          done

      - name: Run Playwright tests
        run: pnpm exec playwright test --reporter=html

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14

  docker-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify runtime versions
        run: |
          set -euo pipefail
          echo "Expected Node major: ${NODE_VERSION}"
          echo "Expected pnpm major: ${PNPM_VERSION}"
          echo "Actual Node: $(node --version)"
          echo "Actual pnpm: $(pnpm --version)"
          ACTUAL_NODE_MAJOR="$(node -p "process.versions.node.split('.')[0]")"
          ACTUAL_PNPM_MAJOR="$(pnpm --version | cut -d. -f1)"
          if [ "${ACTUAL_NODE_MAJOR}" != "${NODE_VERSION}" ]; then
            echo "Node major mismatch: expected ${NODE_VERSION}, got ${ACTUAL_NODE_MAJOR}"
            exit 1
          fi
          if [ "${ACTUAL_PNPM_MAJOR}" != "${PNPM_VERSION}" ]; then
            echo "pnpm major mismatch: expected ${PNPM_VERSION}, got ${ACTUAL_PNPM_MAJOR}"
            exit 1
          fi

      - name: Install Playwright browsers and system deps
        run: pnpm exec playwright install --with-deps

      - name: Build Docker image
        run: docker build -f docker/playground/Dockerfile -t kwdb/playground:latest .

      - name: Pre-pull course images
        run: docker pull kwdb/kwdb:latest

      - name: Start Docker deployment
        run: docker compose -f docker/playground/docker-compose.yml up -d --wait

      - name: Run Docker E2E tests
        run: pnpm exec playwright test --config=playwright.docker.config.ts --reporter=html

      - name: Stop Docker deployment
        if: always()
        run: docker compose -f docker/playground/docker-compose.yml down

      - name: Upload Docker E2E report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docker-e2e-report
          path: playwright-report
          retention-days: 14
